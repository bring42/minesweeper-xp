<!doctype html>
<html lang="en-us">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper XP</title>
  <!-- boxedwine.css provides base styles required by shell.js (.spinner, .modalDialog, etc.) -->
  <link rel="stylesheet" href="/boxedwine.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #3a6ea5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Tahoma, 'Segoe UI', sans-serif;
      color: #fff;
    }

    /* ── XP-styled loading area ──────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      padding: 32px;
    }

    .xp-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #e8540c 0%, #ffb900 40%, #00b04f 60%, #0078d7 100%);
      border-radius: 50%;
      box-shadow: 0 0 24px rgba(255,255,255,0.3);
    }

    #loading h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    }

    #status.emscripten {
      font-size: 13px;
      opacity: 0.8;
      color: #fff;
    }

    /* Style the Emscripten progress bar */
    progress#progress {
      width: 280px;
      height: 20px;
      border: none;
      border-radius: 10px;
      overflow: hidden;
      -webkit-appearance: none;
      appearance: none;
    }
    progress#progress::-webkit-progress-bar  { background: rgba(0,0,0,0.35); }
    progress#progress::-webkit-progress-value { background: linear-gradient(to right, #1e90ff, #00c8ff); }
    progress#progress::-moz-progress-bar      { background: linear-gradient(to right, #1e90ff, #00c8ff); }

    /* Use our logo instead of the default spinner */
    #spinner { display: none !important; }

    /* ── Canvas area ─────────────────────────────────────────── */
    #dropzone {
      display: none;   /* shown by JS once canvas gets a size */
      justify-content: center;
      align-items: center;
    }

    .emscripten_border {
      border: 2px solid rgba(255,255,255,0.3) !important;
      border-radius: 4px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    canvas.emscripten {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Hide all controls — required in DOM but not shown ───── */
    #controls-row, #output, hr { display: none !important; }
  </style>
</head>
<body>

  <!-- Loading screen — IDs required by boxedwine-shell.js -->
  <div id="loading">
    <div class="xp-logo"></div>
    <h1>Minesweeper XP</h1>
    <figure id="spinner" style="overflow:visible">
      <div class="spinner" style="margin:.5em auto"></div>
    </figure>
    <div class="emscripten" id="status">Loading Wine…</div>
    <div class="emscripten">
      <progress value="0" max="100" id="progress"></progress>
    </div>
  </div>

  <!-- Controls — required by shell.js but hidden from users -->
  <div id="controls-row">
    <button id="startbtn"   onclick="start()">Start</button>
    <button id="uploadbtn"  onclick="document.getElementById('upload').click()">Add File(s)</button>
    <input  id="upload" name="upload" type="file" multiple
            onchange="startWithFiles(event.target.files)">
    <button id="downloadbtn" onclick="buildGetFilesModal()">Get File(s)</button>
    <a id="modalLink"    href="#openModal"    style="display:none">Open</a>
    <a id="modalLinkExe" href="#openModalExe" style="display:none">Open</a>
    <span id="sound-checkbox">
      <input type="checkbox" id="soundToggle" onclick="toggleSound()"> Enable Sound
    </span>
    <input type="checkbox" id="pointerLock" checked>
    <input type="checkbox" id="showConsole" onclick="toggleConsole()" checked>
    <input type="checkbox" id="resize">
    <input type="button"   value="Fullscreen"
           onclick="Module.requestFullscreen(document.getElementById('pointerLock').checked,
                                             document.getElementById('resize').checked)">
  </div>

  <!-- Game canvas -->
  <div id="dropzone">
    <div class="emscripten_border">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>
  </div>

  <!-- Console output (hidden) -->
  <textarea class="emscripten" id="output" rows="8"></textarea>

  <!-- Modal dialogs required by shell.js -->
  <div id="openModal" class="modalDialog">
    <div>
      <a href="#close" title="Close" class="close" onclick="closeGetFilesModal()">X</a>
      <div>
        <h3>Get File(s)</h3>
        <input id="selectedItem" type="text" size="50" readonly>
        <button onclick="extract()">Get</button>
      </div>
      <div id="tree" class="scroll-style"></div>
      <div><h3 id="loadStatus">Loading…</h3></div>
    </div>
  </div>
  <div id="openModalExe" class="modalDialog">
    <div>
      <a id="openModalExeClick" href="#close" title="Close" class="close">X</a>
      <div>
        <h3>Execute</h3>
        <div id="message"></div>
        <div id="items" class="scroll-style"></div>
      </div>
    </div>
  </div>

  <!-- Shell JS must load after DOM elements above exist -->
  <script src="/boxedwine-shell.js"></script>

  <script>
    // Watch for canvas getting a size — that means the game is rendering.
    // Hide the loading screen and reveal the canvas.
    const canvas = document.getElementById('canvas');
    const observer = new MutationObserver(() => {
      if (canvas.width > 0 && canvas.height > 0) {
        document.getElementById('loading').style.display  = 'none';
        document.getElementById('dropzone').style.display = 'flex';
        observer.disconnect();
      }
    });
    observer.observe(canvas, { attributes: true, attributeFilter: ['width', 'height'] });

    // Register SW (must intercept /boxedwine.zip before Emscripten fetches it),
    // then dynamically inject boxedwine.js so it starts only after SW is active.
    (async () => {
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.register('/sw.js');
          await navigator.serviceWorker.ready;
        } catch (e) {
          console.warn('SW registration failed:', e);
        }
      }
      const s = document.createElement('script');
      s.src = '/boxedwine.js';
      document.body.appendChild(s);
    })();
  </script>

</body>
</html>
