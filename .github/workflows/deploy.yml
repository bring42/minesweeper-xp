name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Boxedwine assets + winmine.zip ────────────────────────────────────
      # Downloads Boxedwine 26R1 web release, extracts runtime files,
      # chunks boxedwine.zip (37 MB) into 20 MB pieces for CF Pages,
      # and bundles winmine.exe into winmine.zip.
      - name: Prepare Boxedwine assets
        run: bash scripts/prepare.sh

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: minesweeper-xp
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
