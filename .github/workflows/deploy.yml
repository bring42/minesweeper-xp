name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── v86 binaries + stub meta.json ──────────────────────────────────────
      # Downloads v86.js, v86.wasm, seabios.bin, vgabios.bin from copy.sh
      # and writes public/chunks/meta.json (stub disk mode — no real disk image).
      # The Windows 98 state is loaded at runtime from i.copy.sh (~13 MB, CORS-open).
      - name: Prepare v86 assets
        run: bash scripts/prepare.sh

      # ── Optional: use a real disk image instead of stub ────────────────────
      # Uncomment this step if you have a disk.img uploaded as a GitHub Release:
      #
      # - name: Download disk image from GitHub Releases
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     gh release download latest --repo "$GITHUB_REPOSITORY" \
      #       --pattern "disk.img" --dir /tmp/diskimg/
      #     python3 scripts/chunk.py /tmp/diskimg/disk.img

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: minesweeper-xp
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
